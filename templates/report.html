<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课后复盘报告</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css?v={{ asset_version }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        .report-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .report-header { text-align: center; margin-bottom: 40px; }
        .report-header h1 { font-size: 28px; margin-bottom: 8px; }
        .report-header p { color: var(--text-muted); }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 32px; }
        .report-stat { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 24px; text-align: center; }
        .report-stat .value { font-size: 36px; font-weight: 700; }
        .report-stat .label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .report-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 24px; margin-bottom: 24px; }
        .report-section h2 { font-size: 16px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        .suggestion-list { list-style: none; }
        .suggestion-list li { padding: 12px 16px; margin-bottom: 8px; background: #eef4fb; border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.6; }
        .chart-area { height: 250px; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--blue); text-decoration: none; font-size: 14px; }
        .btn-generate-ai {
            padding: 10px 24px; border-radius: 8px; border: none;
            background: #f3f0fa; color: #7c6bb4;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-generate-ai:hover { background: #e8e3f5; }
        .btn-generate-ai:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-history-item {
            padding: 12px 16px; margin-bottom: 10px;
            background: #f9f7fc; border-left: 3px solid #7c6bb4;
            border-radius: 0 8px 8px 0; font-size: 13px; line-height: 1.6;
        }
        .ai-history-item .agent-tag {
            display: inline-block; font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 4px; margin-right: 8px;
            background: #f3f0fa; color: #7c6bb4;
        }
        .ai-history-item .time-tag { font-size: 11px; color: var(--text-muted); }
        .ai-history-item.is-active { background: #efeaff; box-shadow: 0 2px 8px rgba(124,107,180,0.18); }
        .ai-history-item .jump-btn {
            float: right; font-size: 11px; color: #7c6bb4; cursor: pointer;
            border: 1px solid #d4c9f0; background: #fff; padding: 1px 8px; border-radius: 10px;
        }
        .ai-history-item .jump-btn:hover { background: #f3f0fa; }
        .transcript-row {
            display: flex; gap: 10px; padding: 6px 8px; border-bottom: 1px dashed var(--border);
            font-size: 13px; line-height: 1.6; cursor: pointer; transition: background .15s;
        }
        .transcript-row:hover { background: #f6f3fc; }
        .transcript-row.is-active { background: #efeaff; }
        .transcript-row .ts {
            color: var(--purple); font-weight: 600; min-width: 52px;
        }
        .transcript-empty { color: var(--text-muted); font-size: 13px; padding: 8px; }
    </style>
    
</head>
<body>
<div class="report-container">
    <div class="report-header">
        <h1>课后复盘报告</h1>
        <p id="reportMeta">加载中...</p>
    </div>

    <div class="report-grid">
        <div class="report-stat">
            <div class="value" id="rAvgScore">--</div>
            <div class="label">平均专注度</div>
        </div>
        <div class="report-stat">
            <div class="value" id="rDuration">--</div>
            <div class="label">课程时长（分钟）</div>
        </div>
        <div class="report-stat">
            <div class="value" id="rSnapshots">--</div>
            <div class="label">数据采样点</div>
        </div>
    </div>

    <div class="report-section">
        <h2>专注度走势</h2>
        <p style="font-size:12px;color:var(--text-muted);margin:-8px 0 12px;">
            曲线上的 <span style="color:#7c6bb4;font-weight:600;">●</span> 为 AI 洞察时刻；
            <span style="color:#4a7fc4;font-weight:600;">◆</span> 为语音转写节点。
            点击任意列表项可跳转到对应时刻。
        </p>
        <div class="chart-area">
            <canvas id="reportChart"></canvas>
        </div>
    </div>

    <!-- 课堂语音转写 -->
    <div class="report-section" id="transcriptSection" style="display:none;">
        <h2>课堂语音转写</h2>
        <div id="transcriptList" style="max-height:280px;overflow-y:auto;"></div>
    </div>

    <div class="report-section">
        <h2>改进建议</h2>
        <ul class="suggestion-list" id="suggestions"></ul>
    </div>

    <!-- AI 助教课后分析 -->
    <div class="report-section" id="aiSection" style="display:none;">
        <h2>AI 助教课后分析</h2>
        <div id="aiSummaryContent" style="line-height:1.8;white-space:pre-wrap;"></div>
        <button class="btn-generate-ai" id="btnGenerateAI" onclick="generateAISummary()" style="margin-top:16px;">
            生成 AI 课后总结
        </button>
        <div id="aiGenerating" style="display:none;color:var(--text-muted);font-size:13px;margin-top:8px;">
            AI 正在分析中...
        </div>
    </div>

    <!-- Agent 逐条分析记录 -->
    <div class="report-section" id="aiHistorySection" style="display:none;">
        <h2>课中 Agent 分析记录</h2>
        <div id="aiHistoryList"></div>
    </div>

    <a href="/" class="back-link">← 返回仪表盘</a>
</div>

<script>
const sessionId = JSON.parse('{{ session_id | tojson }}');
// 全局状态：报告页多个区块共享
// classStart: 课堂开始 wall-clock（二者都是 Date），insightDots/transcriptDots: 画到图上的点
let reportChart = null;
let classStart = null;
let snapshotMaxSec = 0;
let insightDots = [];     // [{x: secLabel, y: scoreOnCurve, agent, content, ts}]
let transcriptDots = [];  // [{x, y, start, end, text}]

function fmtMMSS(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function nearestScoreAt(sec, snapshots) {
    if (!snapshots.length) return 50;
    let best = snapshots[0];
    let bestDiff = Math.abs((best.elapsed_seconds || 0) - sec);
    for (const s of snapshots) {
        const d = Math.abs((s.elapsed_seconds || 0) - sec);
        if (d < bestDiff) { bestDiff = d; best = s; }
    }
    return best.attention_score || 0;
}

function labelAt(sec) { return fmtMMSS(sec); }

async function loadReport() {
    const resp = await fetch(`/api/sessions/${sessionId}`);
    const data = await resp.json();

    if (data.error) {
        document.getElementById('reportMeta').textContent = data.error;
        return;
    }

    document.getElementById('reportMeta').textContent =
        `${data.name} | ${data.start_time || '未知'}`;
    document.getElementById('rAvgScore').textContent =
        data.avg_attention != null ? Math.round(data.avg_attention) + '%' : '--';
    document.getElementById('rSnapshots').textContent = data.snapshots.length;

    if (data.snapshots.length > 1) {
        const first = data.snapshots[0].elapsed_seconds;
        const last = data.snapshots[data.snapshots.length - 1].elapsed_seconds;
        document.getElementById('rDuration').textContent = Math.round((last - first) / 60);
        snapshotMaxSec = last;
    }
    if (data.start_time) classStart = new Date(data.start_time);

    // 全局保存快照，后续洞察/转写点位需要
    window.__snapshots = data.snapshots;

    // 图表
    const labels = data.snapshots.map(s => {
        const m = Math.floor(s.elapsed_seconds / 60);
        const sec = s.elapsed_seconds % 60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    });
    const scores = data.snapshots.map(s => s.attention_score);

    new Chart(document.getElementById('reportChart').getContext('2d'), {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: '专注度 %',
                data: scores,
                borderColor: '#4a7fc4',
                backgroundColor: 'rgba(74,127,196,0.08)',
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                borderWidth: 2,
            },
            {
                label: 'AI 洞察',
                data: [],            // 后续 loadAgentHistory 填入
                showLine: false,
                pointRadius: 6,
                pointHoverRadius: 8,
                pointBackgroundColor: '#7c6bb4',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
            },
            {
                label: '语音节点',
                data: [],
                showLine: false,
                pointStyle: 'rectRot',
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#4a7fc4',
            }],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#7a7a7a', maxTicksLimit: 10 } },
                y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#7a7a7a' } },
            },
            plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } },
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const dsi = ctx.datasetIndex;
                            if (dsi === 1) {
                                const dot = insightDots[ctx.dataIndex];
                                return dot ? (dot.agent + ': ' + (dot.content || '').slice(0, 40) + '...') : '';
                            }
                            if (dsi === 2) {
                                const dot = transcriptDots[ctx.dataIndex];
                                return dot ? ('[' + fmtMMSS(dot.start) + '] ' + (dot.text || '').slice(0, 40)) : '';
                            }
                            return '专注度 ' + Math.round(ctx.parsed.y) + '%';
                        }
                    }
                }
            },
            onClick: (evt, items) => {
                if (!items.length) return;
                const it = items[0];
                if (it.datasetIndex === 1) {
                    const dot = insightDots[it.index];
                    if (dot) scrollToInsight(dot.id);
                } else if (it.datasetIndex === 2) {
                    const dot = transcriptDots[it.index];
                    if (dot) scrollToTranscript(dot.start);
                }
            }
        },
    });
    reportChart = Chart.getChart('reportChart');

    // 建议（基于前端简单分析）
    const avgScore = scores.reduce((a,b) => a+b, 0) / scores.length;
    const suggestions = document.getElementById('suggestions');
    const tips = [];

    if (avgScore < 60) tips.push('整体专注度偏低，建议增加课堂互动环节（提问、小组讨论、案例分析）');
    if (avgScore >= 60 && avgScore < 80) tips.push('专注度中等，可在低谷时段穿插趣味内容或短暂休息');
    if (avgScore >= 80) tips.push('课堂表现优秀！当前教学节奏非常好，建议保持');

    // 找低谷时段
    let minIdx = 0;
    for (let i = 1; i < scores.length; i++) {
        if (scores[i] < scores[minIdx]) minIdx = i;
    }
    if (scores.length > 5) {
        const minTime = data.snapshots[minIdx].elapsed_seconds;
        tips.push(`第 ${Math.floor(minTime/60)} 分钟左右专注度最低（${Math.round(scores[minIdx])}%），建议此处调整教学方式`);
    }

    tips.forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        suggestions.appendChild(li);
    });
}

async function loadAgentHistory() {
    try {
        const resp = await fetch(`/api/agent/history?session_id=${sessionId}`);
        const history = await resp.json();
        if (history.length === 0) return;

        // 显示课中分析记录
        const section = document.getElementById('aiHistorySection');
        section.style.display = '';
        const list = document.getElementById('aiHistoryList');

        const agentNames = { student: '学生视角', teacher: '教学顾问', summary: '汇总' };
        const snaps = window.__snapshots || [];
        history.forEach((item, idx) => {
            const id = 'insight-' + idx;
            // 推断该洞察对应的"上课秒数"：用 timestamp 减去 classStart
            let elapsedSec = item.elapsed || 0;
            if (!elapsedSec && item.timestamp && classStart) {
                const ts = new Date(item.timestamp);
                elapsedSec = Math.max(0, Math.floor((ts - classStart) / 1000));
            }
            const score = nearestScoreAt(elapsedSec, snaps);
            insightDots.push({
                id, x: labelAt(elapsedSec), y: score,
                agent: agentNames[item.agent] || item.agent,
                content: item.content,
                ts: item.timestamp || '',
            });

            const div = document.createElement('div');
            div.className = 'ai-history-item';
            div.id = id;
            div.innerHTML = '<span class="agent-tag">' + (agentNames[item.agent] || item.agent) + '</span>' +
                '<span class="time-tag">' + (item.timestamp || '') + ' · 第 ' + Math.floor(elapsedSec/60) + ' 分钟</span>' +
                '<button class="jump-btn" onclick="jumpChartTo(' + elapsedSec + ')">在曲线上定位</button>' +
                '<p style="margin:8px 0 0;white-space:pre-wrap">' + (item.content || '').replace(/</g,'&lt;') + '</p>';
            list.appendChild(div);
        });

        // 把洞察点画上去（dataset[1]）
        if (reportChart) {
            reportChart.data.datasets[1].data = insightDots.map(d => ({ x: d.x, y: d.y }));
            reportChart.update('none');
        }

        // 检查是否有 summary
        const latest = await (await fetch(`/api/agent/latest?session_id=${sessionId}`)).json();
        if (latest.summary) {
            document.getElementById('aiSection').style.display = '';
            document.getElementById('aiSummaryContent').textContent = latest.summary;
            document.getElementById('btnGenerateAI').style.display = 'none';
        } else {
            document.getElementById('aiSection').style.display = '';
        }
    } catch (e) { /* ignore */ }
}

async function generateAISummary() {
    const btn = document.getElementById('btnGenerateAI');
    const hint = document.getElementById('aiGenerating');
    const contentEl = document.getElementById('aiSummaryContent');

    btn.disabled = true;
    hint.style.display = '';
    contentEl.textContent = '';

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${location.host}/ws/attention`);

    // 2 分钟硬超时，避免永远转圈
    let firstChunkReceived = false;
    const timeoutId = setTimeout(() => {
        if (!firstChunkReceived) {
            contentEl.textContent = '生成超时，请检查大模型配置或网络后重试';
            hint.style.display = 'none';
            btn.disabled = false;
            try { ws.close(); } catch (e) {}
        }
    }, 120000);

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'agent_chunk' && data.agent === 'summary') {
            firstChunkReceived = true;
            contentEl.textContent += data.content;
            hint.style.display = 'none';
        }
        if (data.type === 'agent_done' && data.agent === 'summary') {
            contentEl.textContent = data.content;
            btn.style.display = 'none';
            clearTimeout(timeoutId);
            ws.close();
        }
        if (data.type === 'agent_error' && data.agent === 'summary') {
            contentEl.textContent = '分析失败: ' + data.error;
            hint.style.display = 'none';
            btn.disabled = false;
            clearTimeout(timeoutId);
            ws.close();
        }
    };

    ws.onerror = () => {
        contentEl.textContent = 'WebSocket 连接失败，请刷新页面重试';
        hint.style.display = 'none';
        btn.disabled = false;
        clearTimeout(timeoutId);
    };

    ws.onopen = async () => {
        try {
            const resp = await fetch('/api/agent/summary', { method: 'POST' });
            const json = await resp.json();
            if (json.error) {
                contentEl.textContent = json.error;
                hint.style.display = 'none';
                btn.disabled = false;
                clearTimeout(timeoutId);
                ws.close();
            }
        } catch (e) {
            contentEl.textContent = '触发失败: ' + e.message;
            hint.style.display = 'none';
            btn.disabled = false;
            clearTimeout(timeoutId);
            ws.close();
        }
    };
}

loadReport().then(() => {
    loadAgentHistory();
    loadTranscript();
});

async function loadTranscript() {
    try {
        const resp = await fetch(`/api/sessions/${sessionId}/transcript`);
        const segs = await resp.json();
        if (!segs || !segs.length) return;
        const section = document.getElementById('transcriptSection');
        const list = document.getElementById('transcriptList');
        section.style.display = '';
        list.innerHTML = '';

        const snaps = window.__snapshots || [];
        segs.forEach((s, i) => {
            const start = s.start_seconds || 0;
            const score = nearestScoreAt(start, snaps);
            transcriptDots.push({ x: labelAt(start), y: score, start, end: s.end_seconds, text: s.text });

            const row = document.createElement('div');
            row.className = 'transcript-row';
            row.id = 'tr-' + i;
            row.dataset.start = String(start);
            row.innerHTML = '<span class="ts">[' + fmtMMSS(start) + ']</span>' +
                '<span>' + (s.text || '').replace(/</g, '&lt;') + '</span>';
            row.onclick = () => jumpChartTo(start);
            list.appendChild(row);
        });

        if (reportChart) {
            // 转写节点太密会糊，按每 ~30 秒一段降采样
            const sampled = [];
            let lastSec = -999;
            transcriptDots.forEach(d => {
                if (d.start - lastSec >= 25) {
                    sampled.push({ x: d.x, y: d.y });
                    lastSec = d.start;
                }
            });
            reportChart.data.datasets[2].data = sampled;
            reportChart.update('none');
        }
    } catch (e) { console.warn('transcript', e); }
}

function jumpChartTo(sec) {
    // 高亮最近的转写行
    document.querySelectorAll('.transcript-row.is-active').forEach(el => el.classList.remove('is-active'));
    let best = null, bestDiff = Infinity;
    document.querySelectorAll('.transcript-row').forEach(el => {
        const d = Math.abs(parseFloat(el.dataset.start || '0') - sec);
        if (d < bestDiff) { bestDiff = d; best = el; }
    });
    if (best) {
        best.classList.add('is-active');
        best.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function scrollToInsight(id) {
    document.querySelectorAll('.ai-history-item.is-active').forEach(el => el.classList.remove('is-active'));
    const el = document.getElementById(id);
    if (el) {
        el.classList.add('is-active');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function scrollToTranscript(start) { jumpChartTo(start); }
</script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
